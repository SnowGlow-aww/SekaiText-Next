name: Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: app-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json
      - name: Preflight updater publication credentials
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          APP_UPDATE_SIGNING_KEY_ID: ${{ vars.APP_UPDATE_SIGNING_KEY_ID }}
          APP_UPDATE_SIGNING_PRIVATE_KEY: ${{ secrets.APP_UPDATE_SIGNING_PRIVATE_KEY }}
          SEKAITEXT_APP_UPDATE_PUBLIC_KEYS: ${{ vars.SEKAITEXT_APP_UPDATE_PUBLIC_KEYS }}
        run: |
          node --input-type=module <<'NODE'
          import { createPrivateKey, createPublicKey } from 'node:crypto'
          for (const name of ['OSS_ACCESS_KEY_ID', 'OSS_ACCESS_KEY_SECRET', 'APP_UPDATE_SIGNING_KEY_ID', 'APP_UPDATE_SIGNING_PRIVATE_KEY', 'SEKAITEXT_APP_UPDATE_PUBLIC_KEYS']) {
            if (!process.env[name]) throw new Error(`${name} is required before release artifacts are published`)
          }
          const keyId = process.env.APP_UPDATE_SIGNING_KEY_ID
          const keys = JSON.parse(process.env.SEKAITEXT_APP_UPDATE_PUBLIC_KEYS)
          const privateKey = createPrivateKey({
            key: Buffer.from(process.env.APP_UPDATE_SIGNING_PRIVATE_KEY, 'base64'),
            format: 'der',
            type: 'pkcs8',
          })
          if (privateKey.asymmetricKeyType !== 'ed25519') throw new Error('app update signing key is not Ed25519')
          const publicValue = createPublicKey(privateKey).export({ format: 'der', type: 'spki' }).subarray(-32).toString('base64')
          if (keys?.[keyId] !== publicValue) throw new Error(`app update key ${keyId} does not match the release trust root`)
          NODE
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: backend/go.sum
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - run: npm ci
      - name: Verify signed plugin market before embedding trust roots
        env:
          SEKAITEXT_PLUGIN_PUBLIC_KEYS: ${{ vars.SEKAITEXT_PLUGIN_PUBLIC_KEYS }}
        run: node scripts/verify-plugin-market.mjs
      - name: Verify release versions
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            node scripts/sync-version.mjs --check --tag "$GITHUB_REF_NAME"
          else
            node scripts/sync-version.mjs --check
          fi
      - run: npm test
      - run: npm run build
      - run: go test -race ./...
        working-directory: backend
      - name: Prepare generated engine resource path
        run: mkdir -p src-tauri/resources/engine
      - run: cargo test --locked --manifest-path src-tauri/Cargo.toml
      - run: cargo check --locked --release --manifest-path src-tauri/Cargo.toml
      - run: npm ci
        working-directory: website
      - run: npm run build
        working-directory: website

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          # Engine RIDs are osx-arm64;win-x64 only. aarch64-pc-windows-msvc is dropped:
          # the engine's native libcvextern (OpenCV/EmguCV) has no win-arm64 build, so the
          # auto-timing/压制 sidecar cannot be bundled there.
          #
          # macOS runner is PINNED to macos-14 (Apple silicon / arm64). macos-latest is a
          # moving alias and was historically x64 (macos-12/13); an x64 runner would (a)
          # mismatch the osx-arm64 self-contained publish native libs and (b) fail to even
          # run the arm64 static ffmpeg `-version` check (no Rosetta for arm64-on-x64).
          - platform: macos-14
            target: aarch64-apple-darwin
            rid: osx-arm64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rid: win-x64

    runs-on: ${{ matrix.platform }}
    env:
      TAURI_TARGET: ${{ matrix.target }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # secrets.* cannot be used in step `if:` directly; surface presence as env.
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
      # Public, non-secret Ed25519 trust set embedded into the Go sidecar as
      # {"keyId":"base64-raw-public-key"}. Empty intentionally disables new
      # official plugin installs/updates without affecting installed plugins.
      SEKAITEXT_PLUGIN_PUBLIC_KEYS: ${{ vars.SEKAITEXT_PLUGIN_PUBLIC_KEYS }}
      # Independent trust root for the signed app-release manifest. This only
      # authenticates release metadata; it is unrelated to platform code signing.
      SEKAITEXT_APP_UPDATE_PUBLIC_KEYS: ${{ vars.SEKAITEXT_APP_UPDATE_PUBLIC_KEYS }}
      # build-engine.mjs (run by `npx tauri build` via beforeBuildCommand) reads ENGINE_DIR
      # = the SekaiToolsEngine self-contained publish dir for this RID. The native libs
      # (libSkiaSharp/libHarfBuzzSharp/libcvextern) sit as SEPARATE files alongside the
      # single-file engine binary in that dir.
      ENGINE_DIR: ${{ github.workspace }}/engine-src/SekaiToolsEngine/bin/Release/net10.0/${{ matrix.rid }}/publish
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Auto-timing/压制 engine source (SnowGlow-aww/SekaiTools-Avalonia). The whole solution
      # is needed: SekaiToolsEngine has ProjectReferences to Core/Base/DataFetch/Platform and
      # Compile-links 4 files from SekaiToolsApp/Services.
      - name: Checkout SekaiToolsEngine source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: SnowGlow-aww/SekaiTools-Avalonia
          # Pin the exact engine revision used by this app release. Moving-branch checkouts
          # can silently bundle a different sidecar when a rerun happens days later.
          ref: 6ed8009247814911abbed39a4105241e778a27d6
          path: engine-src

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "10.0.x"

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Setup macOS target
        if: matrix.target == 'aarch64-apple-darwin'
        run: rustup target add aarch64-apple-darwin

      - run: npm ci

      - name: Build Go backend sidecar
        run: node scripts/build-go.mjs

      # Publish the SekaiToolsEngine sidecar self-contained for the target RID into ENGINE_DIR.
      # Native libs land as SEPARATE files next to the single-file binary, which is exactly what
      # build-engine.mjs expects (it copies the engine exe + every native lib, skipping .pdb).
      # IMPORTANT: do NOT pass -p:IncludeNativeLibrariesForSelfExtract=true — that embeds the
      # native libs for self-extract (what the avalonia App workflow does) and is the WRONG
      # output for this sidecar. PublishSingleFile/SelfContained are also set in the csproj.
      #
      # `-o "${{ env.ENGINE_DIR }}"` pins the output to exactly ENGINE_DIR. Without it we rely on
      # the default bin/<Config>/<TFM>/<RID>/publish path, which silently breaks if the foreign
      # repo changes its TargetFramework or opts into UseArtifactsOutput (output -> artifacts/...).
      - name: Publish SekaiToolsEngine sidecar
        run: dotnet publish engine-src/SekaiToolsEngine/SekaiToolsEngine.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -o "${{ env.ENGINE_DIR }}"

      # Static FFmpeg 8.1.2 WITH libass for ASS subtitle burn-in. Both archives and
      # digests are pinned to versioned upstream paths and published checksums.
      - name: Fetch static ffmpeg (macOS arm64, libass)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/ffmpeg-bin"
          FF="$GITHUB_WORKSPACE/ffmpeg-bin/ffmpeg"
          curl -fL --retry 3 -o "$GITHUB_WORKSPACE/ffmpeg-bin/ffmpeg.zip" "https://ffmpeg.martin-riedl.de/download/macos/arm64/1783011502_8.1.2/ffmpeg.zip"
          echo "ef1aa60006c7b77ce170c1608c08d8e4ba1c30c5746f2ac986ded932d0ac2c3c  $GITHUB_WORKSPACE/ffmpeg-bin/ffmpeg.zip" | shasum -a 256 -c -
          unzip -o "$GITHUB_WORKSPACE/ffmpeg-bin/ffmpeg.zip" ffmpeg -d "$GITHUB_WORKSPACE/ffmpeg-bin"
          chmod +x "$FF"
          "$FF" -hide_banner -version > "$GITHUB_WORKSPACE/ffver.txt" 2>&1
          grep -q -- enable-libass "$GITHUB_WORKSPACE/ffver.txt" && echo "libass OK" || { echo "::error::ffmpeg missing libass"; exit 1; }
          echo "FFMPEG_BIN=$FF" >> "$GITHUB_ENV"

      # Windows x64: BtbN static GPL build pinned to one n8.1 autobuild, matching the
      # macOS stable channel. The former ffmpeg-master-latest (git master nightly) shipped a
      # build whose stderr periodic stats never appear on real Windows hw pipelines (dxva2+QSV),
      # blanking suppress progress — never ship nightlies. Uses pwsh so
      # `curl.exe` (not the Invoke-WebRequest alias) and Expand-Archive avoid tar/unzip pitfalls.
      # shell: pwsh is pinned explicitly so Out-File -Encoding utf8 writes NO BOM (PowerShell 7),
      # avoiding a BOM corrupting the FFMPEG_BIN line written to $GITHUB_ENV under Windows PowerShell 5.1.
      - name: Fetch static ffmpeg (Windows x64, libass)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          curl.exe -fL --retry 3 -o ffmpeg.zip "https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2026-07-18-13-13/ffmpeg-n8.1.2-22-g94138f6973-win64-gpl-8.1.zip"
          $actual = (Get-FileHash -Algorithm SHA256 ffmpeg.zip).Hash.ToLowerInvariant()
          $expected = '764716fa5cff555431791945f15db61c0aa85cc61023bfe36668f32f2b256b62'
          if ($actual -ne $expected) { Write-Error "ffmpeg.zip SHA-256 mismatch: $actual"; exit 1 }
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-extracted -Force
          $bin = (Get-ChildItem -Path ffmpeg-extracted -Recurse -Filter ffmpeg.exe | Select-Object -First 1).FullName
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\ffmpeg-bin" | Out-Null
          Copy-Item $bin "$env:GITHUB_WORKSPACE\ffmpeg-bin\ffmpeg.exe" -Force
          $ver = & "$env:GITHUB_WORKSPACE\ffmpeg-bin\ffmpeg.exe" -hide_banner -version
          if ($ver -match 'enable-libass') { Write-Host 'libass OK' } else { Write-Error 'ffmpeg missing libass'; exit 1 }
          "FFMPEG_BIN=$env:GITHUB_WORKSPACE\ffmpeg-bin\ffmpeg.exe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

          cert_info=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
          cert_id=$(echo "$cert_info" | awk -F'"' '{print $2}')

          if [ -z "$cert_id" ]; then
            echo "::error::No Developer ID Application signing identity found"
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$cert_id" >> "$GITHUB_ENV"

      - name: Build Tauri app
        if: runner.os != 'macOS'
        run: npx tauri build --target ${{ matrix.target }}

      - name: Build and sign Tauri app (macOS, signed)
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx tauri build --target ${{ matrix.target }}

      - name: Build Tauri app (macOS, unsigned/ad-hoc)
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT != 'true'
        run: npx tauri build --target ${{ matrix.target }} --bundles app --no-sign

      # `tauri build` without a Developer ID may leave only linker signatures on
      # the app/sidecar. That looks signed in Finder but has no valid resource
      # seal and fails `codesign --deep --strict` after download. Sign nested code
      # first, seal the app, then create the DMG from that verified app.
      - name: Ad-hoc sign and bundle macOS app
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT != 'true'
        shell: bash
        run: |
          set -euo pipefail
          APP="src-tauri/target/${{ matrix.target }}/release/bundle/macos/SekaiText Next.app"
          BACKEND="$APP/Contents/MacOS/sekaitext-backend"
          test -d "$APP"
          test -x "$BACKEND"
          codesign --force --sign - "$BACKEND"
          codesign --force --options runtime --entitlements src-tauri/engine.entitlements --sign - "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

          VERSION=$(node -p "require('./package.json').version")
          DMG_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          STAGE=$(mktemp -d)
          trap 'rm -rf "$STAGE"' EXIT
          mkdir -p "$DMG_DIR"
          ditto "$APP" "$STAGE/SekaiText Next.app"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create \
            -volname "SekaiText Next" \
            -srcfolder "$STAGE" \
            -fs HFS+ \
            -format UDZO \
            -ov "$DMG_DIR/SekaiText Next_${VERSION}_aarch64.dmg"

      # Verify the artifacts users actually download, not just the loose .app.
      # This gates both the Developer-ID path and the ad-hoc fallback path.
      - name: Verify macOS app and DMG code signatures
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          APP="src-tauri/target/${{ matrix.target }}/release/bundle/macos/SekaiText Next.app"
          DMG=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/dmg" -maxdepth 1 -type f -name '*.dmg' -print -quit)
          test -n "$DMG"
          codesign --verify --deep --strict --verbose=2 "$APP"

          MOUNT=$(mktemp -d)
          ATTACHED=0
          cleanup() {
            if [ "$ATTACHED" = 1 ]; then hdiutil detach "$MOUNT" -quiet || true; fi
            rmdir "$MOUNT" 2>/dev/null || true
          }
          trap cleanup EXIT
          hdiutil attach "$DMG" -nobrowse -readonly -mountpoint "$MOUNT" -quiet
          ATTACHED=1
          BUNDLED_APP=$(find "$MOUNT" -maxdepth 1 -type d -name '*.app' -print -quit)
          test -n "$BUNDLED_APP"
          codesign --verify --deep --strict --verbose=2 "$BUNDLED_APP"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sekaitext-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: sekaitext-*
          merge-multiple: true

      - name: Reject retries after an app manifest has been published
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          SEKAITEXT_APP_UPDATE_PUBLIC_KEYS: ${{ vars.SEKAITEXT_APP_UPDATE_PUBLIC_KEYS }}
        run: node scripts/check-release-mutable.mjs

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          overwrite_files: false
          files: |
            **/*.deb
            **/*.dmg
            **/*.exe
            **/*.msi

  manifest:
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    uses: ./.github/workflows/release-manifest.yml
    with:
      tag: ${{ github.ref_name }}
    secrets: inherit
