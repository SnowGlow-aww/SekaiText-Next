name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "package.json" # 发版 bump 版本号时带动重建，刷新下载按钮兜底版本
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Install
        working-directory: website
        run: npm ci
      - name: Build
        working-directory: website
        # 主站在 OSS 桶根(sakimizuki.accr.cc);GH Pages 仅作备份,挂在 /SekaiText-Next/ 下
        run: SITE_BASE=/SekaiText-Next/ npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
